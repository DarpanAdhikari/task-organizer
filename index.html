<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darpan Task Organizer</title>
<link rel="icon" href="https://www.darpanadhikari.com.np/addition/images/logo.ico" type="image/x-icon">
<style>
  :root {
    --bg-gradient: linear-gradient(135deg, #0079bf, #005a8f);
    --list-bg: #f1f2f4;
    --card-bg: #ffffff;
    --text-main: #172b4d;
    --text-light: #44546f;
    --btn-primary: #0c66e4;
    --btn-hover: #0055cc;
    --danger: #c9372c;
    --border-radius-lg: 12px;
    --border-radius-md: 8px;
    --border-radius-sm: 4px;
    --shadow-sm: 0 1px 2px rgba(9, 30, 66, 0.15);
    --shadow-md: 0 4px 8px rgba(9, 30, 66, 0.1);
    --shadow-lg: 0 8px 16px rgba(9, 30, 66, 0.15);
    --transition: all 0.2s ease-in-out;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0; background: var(--bg-gradient); color: var(--text-main);
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }

  header { 
    background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
    color: white; padding: 12px 24px; display: flex; align-items: center; gap: 15px; 
    box-shadow: var(--shadow-sm); border-bottom: 1px solid rgba(255,255,255,0.2);
  }

  .header-actions { display: flex; align-items: center; gap: 10px; margin-left: auto; }
  
  #workspaces { display: flex; flex-direction: column; flex-grow: 1; overflow-y: auto; padding: 20px 24px; gap: 20px; padding-bottom: 60px;}
  
  .workspace-header {
    display: flex; align-items: center; justify-content: space-between; color: white; cursor: pointer;
    font-size: 1.2rem; font-weight: 600; padding: 5px 0; user-select: none;
    transition: opacity 0.2s;
  }
  .workspace-header-title { display: flex; align-items: center; gap: 10px; }
  .workspace-header:hover { opacity: 0.9; }
  .toggle-icon { font-size: 0.8rem; transition: transform 0.3s; }
  .workspace.collapsed .toggle-icon { transform: rotate(-90deg); }
  .workspace.collapsed .board-list { display: none; }

  .board-list { display: flex; gap: 16px; align-items: flex-start; margin-top: 10px; overflow-x: auto; padding-bottom: 10px;}
  .board-list::-webkit-scrollbar { height: 8px; }
  .board-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }

  .board {
    background: var(--list-bg); border-radius: var(--border-radius-lg); width: 280px; min-width: 280px;
    display: flex; flex-direction: column; max-height: 80vh; box-shadow: var(--shadow-sm);
  }

  .board-header { padding: 14px; display: flex; justify-content: space-between; align-items: center; }
  .board-header h3 { margin: 0; font-size: 14px; font-weight: 600; color: var(--text-main); }
  
  .tasks { padding: 0 8px 8px; overflow-y: auto; flex-grow: 1; min-height: 100px; padding-bottom: 50px; }
  
  .task {
    background: var(--card-bg); margin-bottom: 8px; border-radius: var(--border-radius-md);
    box-shadow: var(--shadow-sm); cursor: grab; position: relative;
    transition: var(--transition); overflow: hidden; display: flex; flex-direction: column;
  }
  .task:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .task:active { cursor: grabbing; }
  
  .task.dragging { opacity: 0.5; transform: scale(0.95); box-shadow: none; }

  .task-cover {
    width: 100%; height: 120px; object-fit: cover; 
    border-bottom: 1px solid rgba(0,0,0,0.05); pointer-events: none;
  }

  .task-content { padding: 10px; pointer-events: none; }
  .task-title { font-weight: 500; font-size: 14px; margin-bottom: 4px; display: block; color: var(--text-main); }
  .task-desc-preview { font-size: 12px; color: var(--text-light); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .card-btns { display: flex; gap: 5px; margin-top: 8px; justify-content: flex-end; opacity: 0; transition: var(--transition); pointer-events: auto; }
  .task:hover .card-btns { opacity: 1; }
  .small-btn { font-size: 11px; padding: 4px 8px; border-radius: var(--border-radius-sm); border: none; cursor: pointer; transition: var(--transition); background: #f1f2f4; color: var(--text-light); }
  .small-btn:hover { background: #dcdfe4; color: var(--text-main); }
  .view-btn:hover { background: #e9f2ff; color: var(--btn-primary); }
  .del-btn:hover { background: #ffebeb; color: var(--danger); }

  .modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(9, 30, 66, 0.54); backdrop-filter: blur(3px);
    display: none; justify-content: center; align-items: center; z-index: 1000;
    opacity: 0; transition: opacity 0.2s;
  }
  .modal-overlay.active { display: flex; opacity: 1; }
  .modal { background: #f1f2f4; width: 750px; max-width: 90%; max-height: 90vh; border-radius: var(--border-radius-lg); padding: 24px; box-shadow: var(--shadow-lg); display: flex; flex-direction: column;}
  
  .modal-header-input { width: 100%; font-size: 20px; font-weight: 600; border: 2px solid transparent; background: transparent; padding: 8px; margin-bottom: 15px; border-radius: var(--border-radius-md); transition: var(--transition); }
  .modal-header-input:focus { background: white; border-color: var(--btn-primary); outline: none; }

  .editor-toolbar { display:flex; align-items:center; gap:6px; flex-wrap:wrap; background:#fff; padding:8px; border-radius:10px 10px 0 0; border:1px solid #e4e6eb; border-bottom:none; box-shadow:0 2px 8px rgba(0,0,0,.05); }
  .editor-btn { display:flex; align-items:center; justify-content:center; padding:6px 10px; font-size:12px; font-weight:600; color:#555; background:#fff; border:1px solid #e4e6eb; border-radius:4px; cursor:pointer; transition:all .18s ease; }
  .editor-btn:hover { background:#f5f6f8; border-color:#d0d4da; color:#111; transform:translateY(-1px); }
  .editor-btn:active { transform:scale(.95); background:#e9ebef; }
  .editor-toolbar .separator { width:1px; height:20px; background:#e0e3e7; margin:0 4px; }
  
  .editable-desc {
    background: white; border: 1px solid #dcdfe4; flex-grow: 1; min-height: 250px;
    padding: 16px; border-radius: 0 0 var(--border-radius-md) var(--border-radius-md); outline: none; overflow-y: auto; line-height: 1.6;
  }
  .editable-desc img { max-width: 100%; border-radius: var(--border-radius-md); margin: 8px 0; box-shadow: var(--shadow-sm); transition: outline 0.2s; }

  /* Beautiful View Styles */
  .view-content { background: white; padding: 20px; border-radius: var(--border-radius-md); overflow-y: auto; line-height: 1.6; flex-grow: 1; box-shadow: inset 0 0 5px rgba(0,0,0,0.05);}
  .view-content img { max-width: 100%; border-radius: 8px; }
  .view-content h1, .view-content h2, .view-content h3 { color: var(--text-main); margin-top: 0; }
  
  .input-group { padding: 10px; border-top: 1px solid #dcdfe4; display: flex; flex-direction: column; gap: 8px; }
  input[type="text"], input[type="search"] { width: 100%; padding: 10px; border-radius: var(--border-radius-sm); border: 2px solid #dcdfe4; box-sizing: border-box; transition: var(--transition); font-family: inherit;}
  input[type="text"]:focus, input[type="search"]:focus { border-color: var(--btn-primary); outline: none; }
  
  .btn-primary { background: var(--btn-primary); color: white; padding: 10px 16px; border: none; border-radius: var(--border-radius-sm); cursor: pointer; font-weight: 500; transition: var(--transition); }
  .btn-primary:hover { background: var(--btn-hover); }
  .btn-secondary { background: #091e42; color: white; padding: 8px 12px; border: none; border-radius: var(--border-radius-sm); cursor: pointer; font-weight: 500; transition: var(--transition); }
  .btn-secondary:hover { background: #00122e; }
  
  /* Shared Formatting Styles */
  code { background: #f4f5f7; padding: 3px 6px; border-radius: 4px; font-family: "Courier New", Courier, monospace; color: #eb144c; font-size: 0.9em; }
  .code-block { background: #1e1e1e; color: #d4d4d4; padding: 16px; border-radius: 8px; overflow: auto; font-family: "Courier New", Courier, monospace; margin: 10px 0; line-height: 1.4; box-shadow: inset 0 0 8px rgba(0,0,0,0.5);}
  blockquote { border-left: 4px solid var(--btn-primary); background: #f9fbfc; padding: 10px 15px; color: #555; margin: 10px 0; border-radius: 0 4px 4px 0; font-style: italic;}
  hr { border: 0; height: 1px; background: #dcdfe4; margin: 20px 0; }
</style>
</head>
<body>

<header>
    <span style="font-size: 24px;"><img src="https://www.darpanadhikari.com.np/addition/images/logo.ico" alt="" height="24"></span> 
    <strong style="font-size: 18px;">Darpan Task Organizer</strong>
    
    <div class="header-actions">
        <input type="search" id="searchInput" placeholder="Search cards, lists..." style="width: 200px; padding: 8px;" onkeyup="render()">
        <input type="text" id="newWorkspace" placeholder="New workspace name..." style="width: 170px; padding: 8px;">
        <button onclick="addUser()" class="btn-primary" style="padding: 8px 16px;">Create</button>
        <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.3); margin: 0 5px;"></div>
        <button onclick="importData()" class="btn-secondary">Import .drp</button>
        <button onclick="exportData()" class="btn-secondary">Export .drp</button>
    </div>
</header>

<div id="workspaces"></div>

<div class="modal-overlay" id="viewModalOverlay" onclick="closeViewModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="viewModalTitle" style="margin-top: 0; border-bottom: 2px solid #f1f2f4; padding-bottom: 10px;"></h2>
    <div id="viewModalDesc" class="view-content"></div>
    <div style="margin-top: 20px; display: flex; justify-content: flex-end;">
      <button class="btn-primary" onclick="closeViewModal()">Close</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <input type="text" id="modalTitle" class="modal-header-input">
    
    <label style="font-size: 12px; font-weight: 600; color: var(--text-light); margin-left: 4px;">Description</label>
    <div class="editor-toolbar">
      <button class="editor-btn" onclick="exec('bold')" title="Bold"><b>B</b></button>
      <button class="editor-btn" onclick="exec('italic')" title="Italic"><i>I</i></button>
      <button class="editor-btn" onclick="exec('underline')" title="Underline"><u>U</u></button>
      <button class="editor-btn" onclick="exec('insertUnorderedList')" title="Bullet List">• List</button>
      <div class="separator"></div>
      
      <label style="font-size: 11px; margin-left: 4px;">Text:</label>
      <input type="color" oninput="exec('foreColor', this.value)" style="width: 25px; height: 25px; border: none; cursor: pointer; padding: 0;">
      <label style="font-size: 11px; margin-left: 4px;">Highlight:</label>
      <input type="color" oninput="exec('hiliteColor', this.value)" style="width: 25px; height: 25px; border: none; cursor: pointer; padding: 0;">
      
      <div class="separator"></div>
      <button class="editor-btn" onclick="insertCode()" title="Inline Code">&lt;/&gt;</button>
      <button class="editor-btn" onclick="insertPre()" title="Code Block">Code Block</button>
      <button class="editor-btn" onclick="insertQuote()" title="Quote">""</button>
      <button class="editor-btn" onclick="insertHR()" title="Horizontal Line">---</button>
      <button class="editor-btn" onclick="insertLink()">Link</button>
      
      <div class="separator"></div>
      <label style="font-size: 11px; color: #888;">Image:</label>
      <button class="editor-btn" onclick="imgFloat('left')" title="Float Left">◧</button>
      <button class="editor-btn" onclick="imgFloat('none')" title="Center">◫</button>
      <button class="editor-btn" onclick="imgFloat('right')" title="Float Right">◨</button>
      <button class="editor-btn" onclick="imgSize('25%')" title="25% Size">S</button>
      <button class="editor-btn" onclick="imgSize('50%')" title="50% Size">M</button>
      <button class="editor-btn" onclick="imgSize('100%')" title="100% Size">L</button>
      
      <div class="separator"></div>
      <button class="editor-btn" onclick="clearFormat()">Clear Formats</button>
    </div>
    <div id="modalDesc" class="editable-desc" contenteditable="true"></div>

    <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 12px;">
      <button onclick="closeModal()" style="background:transparent; color: var(--text-light); padding: 10px 20px; border-radius:var(--border-radius-sm); border:none; cursor:pointer; font-weight: 500;">Cancel</button>
      <button class="btn-primary" onclick="saveChanges()">Save Details</button>
    </div>
  </div>
</div>

<footer style="position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); text-align: center; padding: 12px 0; box-shadow: var(--shadow-sm); border-top: 1px solid rgba(255,255,255,0.2);">
    <span><i>&copy;</i><span id="date"></span><a href="https://darpanadhikari.com.np" target="_blank" style="color: white; font-weight: bold; text-decoration: none; margin: 0 5px;">DarpanAdhikari</a>|| All right reserved</span>
</footer>

<script>
    let db;
    let currentTaskRef = null;
    let draggedItem = null;
    let selectedImg = null;
    
    // ==========================================
    // 1. SERVICE WORKER & NOTIFICATIONS BRIDGE
    // ==========================================
    document.addEventListener("DOMContentLoaded", () => {
      // Register Service Worker
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js")
          .then(() => console.log("Service Worker Registered"))
          .catch(err => console.error("SW Registration Failed", err));
      }
      // Request Notification Permission
      if ("Notification" in window && Notification.permission === "default") {
        Notification.requestPermission();
      }
    });
    
    // Helper function to trigger notifications via SW
    function sendNotification(title, text) {
      if ("Notification" in window && Notification.permission === "granted" && navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({
          type: "text",
          title: title,
          text: text,
          icon: "https://www.darpanadhikari.com.np/addition/images/logo.ico"
        });
      }
    }
    // ==========================================
    
    
    const request = indexedDB.open("TrelloSmoothDB", 1);
    request.onupgradeneeded = e => {
      db = e.target.result;
      db.createObjectStore("users", { keyPath: "name" });
    };
    request.onsuccess = e => { db = e.target.result; render(); };
    
    function exec(cmd, val = null) { document.execCommand(cmd, false, val); }
    
    function updateUser(uName, cb) {
      const tx = db.transaction("users", "readwrite");
      const store = tx.objectStore("users");
      store.get(uName).onsuccess = e => {
        const u = e.target.result;
        if(u) {
          cb(u);
          store.put(u);
        }
        tx.oncomplete = render;
      };
    }
    
    // --- Drag and Drop Logic ---
    function handleDragStart(e, uName, bTitle, tId) {
      draggedItem = { uName, bTitle, tId };
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => e.target.classList.add('dragging'), 0);
    }
    
    function handleDragEnd(e) {
      e.target.classList.remove('dragging');
      setTimeout(() => draggedItem = null, 10);
    }
    
    function handleDragOver(e) {
      e.preventDefault(); 
      e.dataTransfer.dropEffect = "move";
    }
    
    function handleDrop(e, targetUName, targetBTitle) {
      e.preventDefault();
      if (!draggedItem) return;
    
      const item = { ...draggedItem };
      if (item.uName !== targetUName) {
        alert("Cross-workspace dragging is disabled.");
        return;
      }
    
      const container = e.currentTarget;
      const afterElement = getDragAfterElement(container, e.clientY);
      const targetId = afterElement ? Number(afterElement.dataset.id) : null;
    
      updateUser(item.uName, u => {
        const sourceBoard = u.boards.find(b => b.title === item.bTitle);
        const targetBoard = u.boards.find(b => b.title === targetBTitle);
        if (!sourceBoard || !targetBoard) return;
    
        const taskIndex = sourceBoard.tasks.findIndex(t => t.id === item.tId);
        if (taskIndex === -1) return;
    
        const [movedTask] = sourceBoard.tasks.splice(taskIndex, 1);
    
        if (targetId === null) {
          targetBoard.tasks.push(movedTask);
        } else {
          const insertIndex = targetBoard.tasks.findIndex(t => t.id === targetId);
          targetBoard.tasks.splice(insertIndex, 0, movedTask);
        }
      });
      
      sendNotification("Card Moved", `Card was moved to list "${targetBTitle}".`);
    }
    
    function getDragAfterElement(container, y) {
      const draggableElements = [...container.querySelectorAll('.task:not(.dragging)')];
      return draggableElements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;
        if (offset < 0 && offset > closest.offset) {
          return { offset: offset, element: child };
        } else {
          return closest;
        }
      }, { offset: Number.NEGATIVE_INFINITY }).element;
    }
    
    // Data Actions
    function addUser() {
      const name = document.getElementById('newWorkspace').value.trim();
      if (!name) return;
      const tx = db.transaction("users", "readwrite");
      // collapsed: false ensures it is open by default
      tx.objectStore("users").add({ name, collapsed: false, boards: [] });
      tx.oncomplete = () => { 
          document.getElementById('newWorkspace').value = ''; 
          render(); 
          sendNotification("Workspace Created", `Workspace "${name}" is ready.`);
      };
    }
    
    function addBoard(uName) {
      const val = document.getElementById(`nb-${uName}`).value.trim();
      if (!val) return;
      updateUser(uName, u => u.boards.push({ title: val, tasks: [] }));
      sendNotification("List Added", `List "${val}" was added to ${uName}.`);
    }
    
    function deleteBoard(uName, bTitle){
      if(!confirm("Delete this list?")) return;
      updateUser(uName, u=>{
        u.boards = u.boards.filter(b => b.title !== bTitle);
      });
      sendNotification("List Deleted", `List "${bTitle}" was removed.`);
    }
    
    function addTask(uName, bTitle) {
      const val = document.getElementById(`nt-${uName}-${bTitle}`).value.trim();
      if (!val) return;
      updateUser(uName, u => {
        u.boards.find(x => x.title === bTitle).tasks.push({ 
          id: Date.now(), title: val, desc: "", html: "", cover: null 
        });
      });
      sendNotification("Card Added", `Card "${val}" added to ${bTitle}.`);
    }
    
    function deleteTask(uName, bTitle, tId) {
      if(!confirm("Delete this card entirely?")) return;
      updateUser(uName, u => {
        const b = u.boards.find(x => x.title === bTitle);
        b.tasks = b.tasks.filter(t => t.id !== tId);
      });
      sendNotification("Card Deleted", `A card was removed from ${bTitle}.`);
    }
    
    function deleteWorkspace(uName) {
      if(!confirm(`Are you sure you want to delete the workspace "${uName}" and all its lists?`)) return;
      const tx = db.transaction("users", "readwrite");
      tx.objectStore("users").delete(uName);
      tx.oncomplete = () => {
          render();
          sendNotification("Workspace Deleted", `Workspace "${uName}" was permanently deleted.`);
      };
    }
    
    function toggleWorkspace(uName) {
      updateUser(uName, u => u.collapsed = !u.collapsed);
    }
    
    // --- Import / Export Logic (.drp Files) ---
    let fileHandle;
    async function exportData() {
        const tx = db.transaction("users", "readonly");
        const req = tx.objectStore("users").getAll();

        req.onsuccess = async (e) => {
            const data = e.target.result;
            const jsonStr = JSON.stringify(data);
            const encryptedData = btoa(unescape(encodeURIComponent(jsonStr)));

            // Ask user to choose file ONLY first time
            if (!fileHandle) {
                const firstTitle = document
                    .querySelector(".workspace-header-title span:nth-child(2)")
                    .textContent.trim();
                fileHandle = await window.showSaveFilePicker({
                    suggestedName: `${firstTitle}.drp`,
                    types: [{
                    description: "Darpan Tasks organizer Export developed by darpanadhikari.com.np",
                    accept: { "application/octet-stream": [".drp"] }
                    }]
                });
            }

            // Overwrite file
            const writable = await fileHandle.createWritable();
            await writable.write(encryptedData);
            await writable.close();

            sendNotification("Export Successful", "Tasks exported and file replaced.");
        };
    }
    
    function importData() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.drp';
      input.onchange = (e) => {
          const file = e.target.files[0];
          if (!file) return;
    
          const reader = new FileReader();
          reader.onload = (event) => {
              try {
                  const encryptedData = event.target.result;
                  const jsonStr = decodeURIComponent(escape(atob(encryptedData)));
                  const importedWorkspaces = JSON.parse(jsonStr);
                  mergeImportedData(importedWorkspaces);
              } catch (error) {
                  alert("Error: Invalid or corrupted .drp file. Ensure it was exported from this software.");
              }
          };
          reader.readAsText(file);
      };
      input.click();
    }
    
    function mergeImportedData(importedWorkspaces) {
      if (!Array.isArray(importedWorkspaces)) return alert("Invalid data format.");
    
      const tx = db.transaction("users", "readwrite");
      const store = tx.objectStore("users");
      
      store.getAll().onsuccess = (e) => {
          const existingWorkspaces = e.target.result;
          
          importedWorkspaces.forEach(impWs => {
              const exWs = existingWorkspaces.find(w => w.name === impWs.name);
              
              if (!exWs) {
                  store.add(impWs);
              } else {
                  let needsUpdate = false;
                  impWs.boards.forEach(impBoard => {
                      const exBoard = exWs.boards.find(b => b.title === impBoard.title);
                      if (!exBoard) {
                          exWs.boards.push(impBoard);
                          needsUpdate = true;
                      } else {
                          impBoard.tasks.forEach(impTask => {
                              const exTask = exBoard.tasks.find(t => t.id === impTask.id);
                              if (!exTask) {
                                  exBoard.tasks.push(impTask);
                                  needsUpdate = true;
                              }
                          });
                      }
                  });
                  if (needsUpdate) store.put(exWs);
              }
          });
      };
      
      tx.oncomplete = () => {
          alert("Data successfully imported and merged without overwriting existing items.");
          render();
          sendNotification("Import Successful", "Your .drp tasks have been merged into your workspace.");
      };
    }
    
    // Modals
    function openModal(e, uName, bTitle, tId) {
      if(e.target.closest('.small-btn')) return;
    
      const tx = db.transaction("users", "readonly");
      tx.objectStore("users").get(uName).onsuccess = event => {
        const task = event.target.result.boards.find(b => b.title === bTitle).tasks.find(t => t.id === tId);
        currentTaskRef = { uName, bTitle, tId };
        document.getElementById('modalTitle').value = task.title;
        document.getElementById('modalDesc').innerHTML = task.html || task.desc;
        document.getElementById('modalOverlay').classList.add('active');
        selectedImg = null; 
      };
    }
    
    function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
    
    function openViewModal(e, uName, bTitle, tId) {
      e.stopPropagation();
      const tx = db.transaction("users", "readonly");
      tx.objectStore("users").get(uName).onsuccess = event => {
        const task = event.target.result.boards.find(b => b.title === bTitle).tasks.find(t => t.id === tId);
        document.getElementById('viewModalTitle').innerText = task.title;
        document.getElementById('viewModalDesc').innerHTML = task.html || task.desc || "<i>No description provided.</i>";
        document.getElementById('viewModalOverlay').classList.add('active');
      };
    }
    
    function closeViewModal(e) {
      if (e) e.stopPropagation();
      document.getElementById('viewModalOverlay').classList.remove('active'); 
    }
    
    function extractCoverImage(htmlString) {
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = htmlString;
      const img = tempDiv.querySelector('img');
      return img ? img.src : null;
    }
    
    function saveChanges() {
      if (!currentTaskRef) return closeModal();
    
      const newTitle = document.getElementById('modalTitle').value;
      const newHtml = document.getElementById('modalDesc').innerHTML;
      const plainText = document.getElementById('modalDesc').innerText;
      const coverImgSrc = extractCoverImage(newHtml);
    
      updateUser(currentTaskRef.uName, u => {
        const board = u.boards.find(x => x.title === currentTaskRef.bTitle);
        if (!board) return; 
        const t = board.tasks.find(x => x.id === currentTaskRef.tId);
        if (!t) return; 
        
        t.title = newTitle;
        t.html = newHtml;
        t.desc = plainText.substring(0, 120); 
        t.cover = coverImgSrc; 
      });
      
      closeModal();
      sendNotification("Card Updated", `Changes to "${newTitle}" were saved.`);
    }
    
    // Render UI with Search Filter & Bug Fixes
    function render() {
      const searchQuery = document.getElementById('searchInput').value.toLowerCase();
    
      const req = db.transaction("users").objectStore("users").getAll();
      req.onsuccess = e => {
        const root = document.getElementById('workspaces');
        root.innerHTML = '';
        const users = e.target.result;
    
        users.forEach(u => {
          let matchesSearch = false;
          let filteredBoards = [];
    
          if (u.name.toLowerCase().includes(searchQuery)) {
            matchesSearch = true;
            filteredBoards = u.boards; 
          } else {
            u.boards.forEach(b => {
              if (b.title.toLowerCase().includes(searchQuery)) {
                matchesSearch = true;
                filteredBoards.push(b);
              } else {
                const matchedTasks = b.tasks.filter(t => 
                  t.title.toLowerCase().includes(searchQuery) || 
                  (t.desc && t.desc.toLowerCase().includes(searchQuery))
                );
                if (matchedTasks.length > 0) {
                  matchesSearch = true;
                  filteredBoards.push({...b, tasks: matchedTasks});
                }
              }
            });
          }
    
          if (searchQuery && !matchesSearch) return;
    
          const boardsToRender = searchQuery ? filteredBoards : u.boards;
    
          const div = document.createElement('div');
          div.className = `workspace ${u.collapsed && !searchQuery ? 'collapsed' : ''}`;
          
          div.innerHTML = `
            <div class="workspace-header" onclick="toggleWorkspace('${u.name}')">
              <div class="workspace-header-title">
                <span class="toggle-icon">▼</span>
                <span ondblclick="renameWorkspace('${u.name}')">${u.name}</span>
              </div>
              <button class="small-btn del-btn" onclick="event.stopPropagation(); deleteWorkspace('${u.name}')">Delete Workspace</button>
            </div>
            <div class="board-list">
              ${boardsToRender.map(b => 
              {
                let backColor =  getSoftColor();
                let borderColor =  getSoftColor();
                return `
                  <div class="board" style="background: ${backColor};">
                    <div class="board-header">
                      <h3 ondblclick="renameBoard('${u.name}', '${b.title}')">${b.title}</h3>
                      <button class="small-btn del-btn" onclick="deleteBoard('${u.name}','${b.title}')">Delete</button>
                    </div>
                    <div class="tasks" ondragover="handleDragOver(event)" ondrop="handleDrop(event, '${u.name}', '${b.title}')">
                      
                      ${b.tasks.map(t => `
                        <div class="task" draggable="true" data-id="${t.id}" style="background: ${backColor}; border:2px dashed ${borderColor};"
                            ondragstart="handleDragStart(event, '${u.name}', '${b.title}', ${t.id})" 
                            ondragend="handleDragEnd(event)"
                            onclick="openModal(event, '${u.name}', '${b.title}', ${t.id})">
                          ${t.cover ? `<img src="${t.cover}" class="task-cover">` : ''}
                          <div class="task-content">
                            <span class="task-title">${t.title}</span>
                            ${t.desc ? `<div class="task-desc-preview">${t.desc}</div>` : ''}
                            <div class="card-btns">
                              <button class="small-btn view-btn" onclick="openViewModal(event, '${u.name}', '${b.title}', ${t.id})">View</button>
                              <button class="small-btn del-btn" onclick="event.stopPropagation(); deleteTask('${u.name}', '${b.title}', ${t.id})">Delete</button>
                            </div>
                          </div>
                        </div>
                      `).join('')}
                    </div>
      
                    <div class="input-group">
                      <input type="text" id="nt-${u.name}-${b.title}" placeholder="Add a card..." onkeypress="if(event.key === 'Enter') addTask('${u.name}','${b.title}')">
                      <button class="btn-primary" onclick="addTask('${u.name}', '${b.title}')">Add Card</button>
                    </div>
                  </div>
                `
                }).join('')}
              <div class="board" style="background: rgba(255,255,255,0.8); border: 2px dashed rgba(0,0,0,0.1); box-shadow: none;">
                <div class="input-group" style="border-top: none;">
                  <input type="text" id="nb-${u.name}" placeholder="New list name..." onkeypress="if(event.key === 'Enter') addBoard('${u.name}')">
                  <button class="btn-primary" onclick="addBoard('${u.name}')">Add List</button>
                </div>
              </div>
            </div>`;
          root.appendChild(div);
        });
      };
    }

    function getSoftColor() {
      const r = Math.floor((Math.random() * 127) + 127); // 127–255
      const g = Math.floor((Math.random() * 127) + 127);
      const b = Math.floor((Math.random() * 127) + 127);

      return `rgb(${r}, ${g}, ${b})`;
    }

    function renameWorkspace(oldName) {
      const newName = prompt("Enter new workspace name:", oldName);
      if (!newName || newName.trim() === "" || newName === oldName) return;

      const tx = db.transaction("users", "readwrite");
      const store = tx.objectStore("users");

      store.get(oldName).onsuccess = e => {
        const data = e.target.result;
        if (!data) return;

        data.name = newName.trim();

        store.delete(oldName); // remove old key
        store.add(data);       // add new key

        tx.oncomplete = () => {
          render();
          sendNotification("Workspace Renamed", `"${oldName}" → "${newName}"`);
        };
      };
  }
  function renameBoard(uName, oldTitle) {
    const newTitle = prompt("Enter new list name:", oldTitle);
    if (!newTitle || newTitle.trim() === "" || newTitle === oldTitle) return;

    updateUser(uName, u => {
      const board = u.boards.find(b => b.title === oldTitle);
      if (board) {
        board.title = newTitle.trim();
      }
    });

    sendNotification("List Renamed", `"${oldTitle}" → "${newTitle}"`);
  }
    // --- Enhanced Editor Functions ---
    function insertCode(){
      const sel = window.getSelection();
      if (sel.rangeCount && sel.toString().length > 0) {
        const code = document.createElement('code');
        code.textContent = sel.toString();
        const range = sel.getRangeAt(0);
        range.deleteContents();
        range.insertNode(code);
      } else {
        document.execCommand("insertHTML", false, "<code>code</code>&nbsp;");
      }
    }
    
    function insertPre(){
      document.execCommand('formatBlock', false, 'PRE');
      const node = window.getSelection().anchorNode;
      const pre = node.nodeType === 3 ? node.parentNode.closest('pre') : node.closest('pre');
      if(pre) pre.className = 'code-block';
    }
    
    function insertQuote(){
      document.execCommand('formatBlock', false, 'BLOCKQUOTE');
    }
    
    function insertHR(){
      document.execCommand('insertHorizontalRule');
    }
    
    function insertLink(){
      const url = prompt("Enter URL (e.g., https://google.com):");
      if(!url) return;
      document.execCommand("createLink", false, url);
    }
    
    function clearFormat(){
      document.execCommand("removeFormat");
      document.execCommand("formatBlock", false, "p");
    }
    
    // Image Tools
    document.getElementById('modalDesc').addEventListener('click', (e) => {
      if (e.target.tagName === 'IMG') {
        if (selectedImg) selectedImg.style.outline = 'none';
        selectedImg = e.target;
        selectedImg.style.outline = '3px solid var(--btn-primary)';
      } else {
        if (selectedImg) {
          selectedImg.style.outline = 'none';
          selectedImg = null;
        }
      }
    });
    
    function imgFloat(alignment) {
      if (selectedImg) {
        selectedImg.style.display = alignment === 'none' ? 'block' : 'inline';
        selectedImg.style.float = alignment;
        selectedImg.style.margin = alignment === 'none' ? '10px auto' : '10px';
      } else {
        alert("Please click an image first to select it.");
      }
    }
    
    function imgSize(size) {
      if (selectedImg) {
        selectedImg.style.width = size;
      } else {
        alert("Please click an image first to select it.");
      }
    }
    
    document.getElementById("modalDesc").addEventListener("keydown", e=>{
      if(e.key==="Enter"){
        const sel=window.getSelection();
        const node=sel.anchorNode;
        if(node && node.parentElement.closest("pre")){
          e.preventDefault();
          document.execCommand("insertHTML",false,"</pre><p><br></p>");
        }
      }
    });
const editor = document.getElementById("modalDesc");
// --- Image Selection ---
editor.addEventListener('click', e => {

// --- Compression Helper ---
function compressImage(file, maxWidth = 800, quality = 0.7, callback) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const ratio = Math.min(1, maxWidth / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width * ratio;
      canvas.height = img.height * ratio;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(blob => callback(blob), 'image/jpeg', quality);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// --- Insert Image into Editor ---
function insertImageBlob(blob) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = document.createElement("img");
    img.src = e.target.result; // Base64 image
    img.style.maxWidth = "100%";

    const sel = window.getSelection();
    if (!sel.rangeCount) return;

    const range = sel.getRangeAt(0);
    range.insertNode(img);
    range.setStartAfter(img);
    range.collapse(true);
  };
  reader.readAsDataURL(blob);
}

// --- Handle Drag & Drop ---
editor.addEventListener("dragover", e => e.preventDefault());

editor.addEventListener("drop", e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file || !file.type.startsWith("image/")) return;
  compressImage(file, 800, 0.7, insertImageBlob);
});

// --- Handle Paste (Screenshots) ---
editor.addEventListener("paste", e => {
  const items = e.clipboardData.items;
  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    if (item.type.startsWith("image/")) {
      const file = item.getAsFile();
      compressImage(file, 800, 0.7, insertImageBlob);
      e.preventDefault();
    }
  }
});
